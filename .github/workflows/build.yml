name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build-build

      - name: Build
        run: >
          powershell -ExecutionPolicy Bypass -File tools\invoke_msbuild_safe.ps1 -PrintEnvironmentSummary
          cmake --build build-build --config Release

      - name: Hosted-stable baseline
        run: >
          powershell -ExecutionPolicy Bypass -File tools\run_hosted_stable_ctest.ps1
          -Config Release -BuildDir build-build -SkipConfigure -SkipBuild

      - name: Package build artifacts
        run: >
          powershell -ExecutionPolicy Bypass -File tools\package_release_assets.ps1
          -ArtifactLabel build-${{ github.run_number }} -Config Release -BuildDir build-build -OutputDir artifacts

      - name: Upload runnable binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-binaries-${{ github.run_number }}
          if-no-files-found: error
          compression-level: 0
          path: |
            artifacts/stage/binary/*

      - name: Upload symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-symbols-${{ github.run_number }}
          if-no-files-found: error
          compression-level: 0
          path: |
            artifacts/stage/symbols/*
